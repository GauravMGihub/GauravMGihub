name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Dark snake
      - uses: Platane/snk@main
        with:
          github_user_name: GauravMGihub
          outputs: dist/github-contribution-grid-snake-dark.svg
          color_snake: "#bf00ff"
          color_dots: "#0d1117,#161b22,#0e4429,#006d32,#26a641,#39d353"

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
